name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Flask test
      run: |
        python -m flask run &
        sleep 5
        curl -s http://127.0.0.1:5000/ || exit 1

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops
    - name: Simulate failure
      run: |
        echo "Simulating failure"
        # exit 1  # uncomment to test rollback mechanism
    - name: Build Docker image with tag
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops:${{ github.sha }} .
    - name: Push Docker image with tag
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops:${{ github.sha }}