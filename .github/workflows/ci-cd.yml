name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Flask test
      run: |
        python -m flask run &
        sleep 5
        curl -s http://127.0.0.1:5000/ || exit 1

    - name: Build Docker image
      run: |
        docker build -t hello-devops .
